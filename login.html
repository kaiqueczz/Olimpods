<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesse sua Conta — Olimpo Pods</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="assets/logo-ignite.png" type="image/png">

<body>
    <div class="auth-page">
        <canvas class="wavy-canvas" id="wavyCanvas"></canvas>

        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo-link">
                    <img src="assets/logo-ignite.png" alt="Olimpo Pods Logo" class="auth-logo rotating-logo">
                </a>

                <!-- IP Location Badge -->
                <div class="location-badge reveal" id="locationBadge"
                    style="display: none; margin: 10px auto; justify-content: center; width: fit-content;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span id="locationText">Carregando...</span>
                </div>

                <h1 class="auth-title gradual-spacing" data-text="Acesse sua Conta">Acesse sua Conta</h1>
                <p class="auth-subtitle">Entre para acompanhar seus pedidos e receber ofertas.</p>
            </div>

            <div class="auth-card glow-card">
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">E-mail</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="auth-input" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="auth-input" placeholder="********" required>
                            <button type="button" class="password-toggle" aria-label="Mostrar/Ocultar Senha">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-helpers">
                        <a href="#" class="auth-link" id="forgotPasswordBtn">Esqueci minha senha?</a>
                    </div>

                    <button type="submit" class="btn-auth">Entrar</button>
                </form>

                <form class="auth-form" id="recoveryForm" style="display: none;">
                    <div class="form-group">
                        <label class="form-label" for="recoveryEmail">E-mail da Conta</label>
                        <div class="input-wrapper">
                            <input type="email" id="recoveryEmail" class="auth-input" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="form-helpers">
                        <a href="#" class="auth-link" id="backToLoginBtn">Voltar para o login</a>
                    </div>

                    <button type="submit" class="btn-auth">Recuperar Senha</button>
                </form>
            </div>

            <div class="auth-footer" id="authFooter">
                Não possui uma conta? <a href="signup.html">Cadastre-se aqui</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/supabase-config.js"></script>
    <script src="script.js"></script>
    <script>
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const recoveryForm = document.getElementById('recoveryForm');
        const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');
        const backToLoginBtn = document.getElementById('backToLoginBtn');
        const authTitle = document.querySelector('.auth-title');
        const authSubtitle = document.querySelector('.auth-subtitle');
        const authFooter = document.getElementById('authFooter');

        // Toggle Logic
        forgotPasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            recoveryForm.style.display = 'flex';
            recoveryForm.classList.add('fade-in');
            authTitle.textContent = 'RECUPERAR SENHA';
            authTitle.setAttribute('data-text', 'RECUPERAR SENHA');
            authSubtitle.textContent = 'Insira seu e-mail para receber um link de recuperação.';
            authFooter.style.display = 'none';
        });

        backToLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            recoveryForm.style.display = 'none';
            loginForm.style.display = 'flex';
            loginForm.classList.add('fade-in');
            authTitle.textContent = 'ACESSE SUA CONTA';
            authTitle.setAttribute('data-text', 'ACESSE SUA CONTA');
            authSubtitle.textContent = 'Entre para acompanhar seus pedidos e receber ofertas.';
            authFooter.style.display = 'block';
        });

        // Specific logic for password toggle
        document.querySelector('.password-toggle').addEventListener('click', function () {
            const input = document.getElementById('password');
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
        });

        // Login Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = loginForm.querySelector('.btn-auth');
            const originalBtnText = submitBtn.textContent;

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Autenticando...';

                // Backend Login
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', result.user.email);
                    localStorage.setItem('userName', result.user.name || '');
                    window.location.href = 'index.html?login=success';
                } else {
                    throw new Error(result.message || 'Verifique suas credenciais.');
                }
            } catch (err) {
                console.error('Login error:', err);
                alert('Erro no login: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });

        // Recovery Submit
        recoveryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recoveryEmail').value.trim();
            const submitBtn = recoveryForm.querySelector('.btn-auth');
            const originalBtnText = submitBtn.textContent;

            try {
                if (!email) throw new Error('Por favor, informe seu e-mail.');

                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando...';

                // Backend Forgot Password
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Save email for reset page
                    sessionStorage.setItem('resetEmail', email);
                    alert('Código de recuperação enviado! Verifique sua caixa de entrada.');
                    // Redirect to reset page
                    window.location.href = 'reset-password.html';
                } else {
                    throw new Error(result.message || 'Falha ao processar solicitação.');
                }

            } catch (err) {
                console.error('Recovery error:', err);
                alert('Erro: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });
    </script>
</body>

</html>
