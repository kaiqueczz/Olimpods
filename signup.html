<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua Conta — Olimpo Pods</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="assets/logo-ignite.png" type="image/png">
</head>

<body>
    <div class="auth-page">
        <canvas class="wavy-canvas" id="wavyCanvas"></canvas>

        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo-link">
                    <img src="assets/logo-ignite.png" alt="Olimpo Pods Logo" class="auth-logo rotating-logo">
                </a>

                <!-- IP Location Badge -->
                <div class="location-badge reveal" id="locationBadge"
                    style="display: none; margin: 10px auto; justify-content: center; width: fit-content;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span id="locationText">Carregando...</span>
                </div>

                <h1 class="auth-title gradual-spacing" data-text="Crie sua Conta">Crie sua Conta</h1>
                <p class="auth-subtitle">Cadastre-se para receber atualizações por e-mail.</p>
            </div>

            <div class="auth-card glow-card">
                <form class="auth-form" id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="fullname">Nome Completo</label>
                        <div class="input-wrapper">
                            <input type="text" id="fullname" class="auth-input" placeholder="Digite seu nome" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">E-mail</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="auth-input" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Celular (WhatsApp)</label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" class="auth-input" placeholder="(00) 00000-0000" maxlength="15"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="auth-input" placeholder="Crie uma senha"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirme a Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm_password" class="auth-input" placeholder="Repita a senha"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">Cadastrar</button>
                </form>
            </div>

            <div class="auth-footer">
                Já tem uma conta? <a href="login.html">Faça login</a>
            </div>
        </div>
    </div>

    <div id="verifyModal" class="verify-modal" style="display: none;">
        <div class="auth-card glow-card">
            <h2 class="auth-title">Verifique seu E-mail</h2>
            <p class="auth-subtitle">Enviamos um código de 6 dígitos para <strong id="sentEmail"></strong></p>
            <form class="auth-form" id="verifyForm">
                <div class="form-group">
                    <label class="form-label">Código de Verificação</label>
                    <input type="text" id="verifyCode" class="auth-input" placeholder="000000" maxlength="6" required>
                </div>
                <button type="submit" class="btn-auth">Verificar Conta</button>
            </form>
        </div>
    </div>

    <style>
        .verify-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/supabase-config.js"></script>
    <script src="script.js"></script>
    <script>
        const signupForm = document.getElementById('signupForm');
        const verifyModal = document.getElementById('verifyModal');
        const verifyForm = document.getElementById('verifyForm');
        const phoneInput = document.getElementById('phone');
        let pendingEmail = '';

        // Máscara para o celular
        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                alert('As senhas não coincidem!');
                return;
            }

            if (phone.length < 14) {
                alert('Por favor, insira um celular válido com DDD.');
                return;
            }

            try {
                if (typeof supabaseClient === 'undefined') {
                    throw new Error('Supabase não foi carregado. Desative bloqueadores de anúncios (AdBlock) e recarregue a página.');
                }

                // Supabase Signup
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            fullname: fullname,
                            phone: phone
                        }
                    }
                });

                if (error) throw error;

                if (data.user && data.session) {
                    // Se o e-mail não precisar de confirmação, loga direto
                    alert('Cadastro realizado com sucesso!');
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', data.user.email);
                    window.location.href = 'index.html?signup=success';
                } else {
                    // Se precisar de confirmação (padrão Supabase)
                    pendingEmail = email;
                    document.getElementById('sentEmail').textContent = email;
                    signupForm.closest('.auth-container').style.display = 'none';
                    verifyModal.style.display = 'flex';
                }
            } catch (err) {
                console.error('Signup error:', err);
                let msg = err.message || err;

                if (msg.includes('Load failed')) {
                    msg = 'Erro de rede: O carregamento falhou. Isso pode ser causado por um bloqueador de anúncios (AdBlock), firewall ou restrição do navegador (como no Safari). Tente desativar extensões ou acessar via http://localhost:3000 em vez de 127.0.0.1.';
                }

                alert('Erro no cadastro: ' + msg);
            }
        });

        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('verifyCode').value;

            try {
                // Supabase Verify OTP
                const { data, error } = await supabaseClient.auth.verifyOtp({
                    email: pendingEmail,
                    token: code,
                    type: 'signup'
                });

                if (error) throw error;

                if (data.session) {
                    alert('Conta verificada! Redirecionando...');
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', data.user.email);
                    window.location.href = 'index.html?signup=success';
                }
            } catch (err) {
                console.error('Verification error:', err);
                alert('Erro na verificação: ' + (err.message || 'Código inválido ou expirado.'));
            }
        });
    </script>
</body>

</html>
