<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua Conta — Olimpo Pods</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="assets/logo-ignite.png" type="image/png">
</head>

<body>
    <div class="auth-page">
        <canvas class="wavy-canvas" id="wavyCanvas"></canvas>

        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo-link">
                    <img src="assets/logo-ignite.png" alt="Olimpo Pods Logo" class="auth-logo rotating-logo">
                </a>

                <!-- IP Location Badge -->
                <div class="location-badge reveal" id="locationBadge"
                    style="display: none; margin: 10px auto; justify-content: center; width: fit-content;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <span id="locationText">Carregando...</span>
                </div>

                <h1 class="auth-title gradual-spacing" data-text="Crie sua Conta">Crie sua Conta</h1>
                <p class="auth-subtitle">Cadastre-se para receber atualizações por e-mail.</p>
            </div>

            <div class="auth-card glow-card">
                <form class="auth-form" id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="fullname">Nome Completo</label>
                        <div class="input-wrapper">
                            <input type="text" id="fullname" class="auth-input" placeholder="Digite seu nome" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">E-mail</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="auth-input" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Celular (WhatsApp)</label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" class="auth-input" placeholder="(00) 00000-0000" maxlength="15"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="auth-input" placeholder="Crie uma senha"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirme a Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm_password" class="auth-input" placeholder="Repita a senha"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">Cadastrar</button>
                </form>
            </div>

            <div class="auth-footer">
                Já tem uma conta? <a href="login.html">Faça login</a>
            </div>
        </div>
    </div>

    <div id="verifyModal" class="verify-modal" style="display: none;">
        <div class="auth-card glow-card">
            <h2 class="auth-title">Verifique seu E-mail</h2>
            <p class="auth-subtitle">Enviamos um código de 6 dígitos para <strong id="sentEmail"></strong></p>
            <form class="auth-form" id="verifyForm">
                <div class="form-group">
                    <label class="form-label">Código de Verificação</label>
                    <input type="text" id="verifyCode" class="auth-input" placeholder="000000" maxlength="6" required>
                </div>
                <button type="submit" class="btn-auth">Verificar Conta</button>
            </form>
        </div>
    </div>

    <style>
        .verify-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>

    <script src="script.js"></script>
    <script>
        const signupForm = document.getElementById('signupForm');
        const verifyModal = document.getElementById('verifyModal');
        const verifyForm = document.getElementById('verifyForm');
        const phoneInput = document.getElementById('phone');
        let pendingEmail = '';

        // Máscara para o celular
        phoneInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;

            if (password !== confirm) {
                alert('As senhas não coincidem!');
                return;
            }

            if (phone.length < 14) {
                alert('Por favor, insira um celular válido com DDD.');
                return;
            }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullname, email, phone, password })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    pendingEmail = email;
                    document.getElementById('sentEmail').textContent = email;
                    signupForm.closest('.auth-container').style.display = 'none';
                    verifyModal.style.display = 'flex';
                } else {
                    alert(result.message);
                }
            } catch (err) {
                console.error('Signup error:', err);
                alert('Erro ao conectar com o servidor. Certifique-se de que o servidor Node.js está rodando (npm run dev ou node server.js).');
            }
        });

        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('verifyCode').value;

            try {
                const response = await fetch('/api/auth/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alert('Conta verificada! Redirecionando para o login...');
                    window.location.href = 'login.html?signup=success';
                } else {
                    alert(result.message);
                }
            } catch (err) {
                alert('Erro na verificação.');
            }
        });
    </script>
</body>

</html>
