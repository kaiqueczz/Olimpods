<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Olimpo Pods</title>
    <link rel="stylesheet" href="styles.css?v=5.0">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="assets/logo-ignite.png" type="image/png">
</head>

<body>
    <div class="auth-page">
        <canvas class="wavy-canvas" id="wavyCanvas"></canvas>

        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo-link">
                    <img src="assets/logo-ignite.png" alt="Olimpo Pods Logo" class="auth-logo rotating-logo">
                </a>

                <h1 class="auth-title gradual-spacing" data-text="NOVA SENHA">NOVA SENHA</h1                <p class="auth-subtitle">Crie uma nova senha de acesso para sua conta usando o código enviado por e-mail.</p>
            </div>

            <div class="auth-card glow-card">
                <div id="resetStatus" style="display: none; text-align: center; margin-bottom: 20px;">
                    <p id="statusMessage" style="color: #ff0b55; font-weight: 600;"></p>
                </div>

                <form class="auth-form" id="resetPasswordForm">
                    <div class="form-group">
                        <label class="form-label" for="resetEmail">E-mail</label>
                        <input type="email" id="resetEmail" class="auth-input" placeholder="seu@email.com" required readonly style="opacity: 0.7; background: rgba(255,255,255,0.05);">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="resetCode">Código de 6 Dígitos</label>
                        <input type="text" id="resetCode" class="auth-input" placeholder="000000" pattern="\d{6}" maxlength="6" required style="letter-spacing: 8px; text-align: center; font-size: 1.5rem; font-weight: 800; color: #ff0b55;">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="newPassword">Nova Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="newPassword" class="auth-input" placeholder="********" required minlength="6">
                            <button type="button" class="password-toggle" data-target="newPassword" aria-label="Mostrar/Ocultar Senha">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth">Redefinir Senha agora</button>
                </form>
            </div>

            <div class="auth-footer">
                <a href="login.html" style="color: #888; text-decoration: none; font-size: 0.9rem;">Voltar para o Login</a>
            </div>
        </div>
    </div>

    <script>
        // Password toggles
        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
            });
        });

        const resetForm = document.getElementById('resetPasswordForm');
        const statusBox = document.getElementById('resetStatus');
        const statusMsg = document.getElementById('statusMessage');
        const emailInput = document.getElementById('resetEmail');

        // Load pre-filled email
        window.addEventListener('load', () => {
            const savedEmail = sessionStorage.getItem('resetEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
            } else {
                alert('Sessão expirada. Por favor, solicite a recuperação novamente.');
                window.location.href = 'login.html';
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const code = document.getElementById('resetCode').value;
            const password = document.getElementById('newPassword').value;
            const submitBtn = resetForm.querySelector('.btn-auth');
            const originalBtnText = submitBtn.textContent;

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Processando...';

                // Call Backend Reset Password
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        code,
                        newPassword: password
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Success UI
                    statusBox.style.display = 'block';
                    statusMsg.textContent = 'Senha atualizada com sucesso! Redirecionando...';
                    statusMsg.style.color = '#00ff7f';
                    resetForm.style.display = 'none';
                    sessionStorage.removeItem('resetEmail');

                    setTimeout(() => {
                        window.location.href = 'login.html?reset=success';
                    }, 2500);
                } else {
                    throw new Error(result.message || 'Código inválido ou erro no servidor.');
                }

            } catch (err) {
                console.error('Reset error:', err);
                alert('Erro: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });
    </script>
</body>
</html>
