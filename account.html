<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta — Olimpo Pods</title>
    
    <!-- Link para fontes do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="styles.css">

    <link rel="icon" href="assets/logo-ignite.png" type="image/png">
    
    <style>
        /* Estilos específicos do Painel (Dashboard) */
        .dashboard-container {
            max-width: 1200px;
            margin: 100px auto 60px;
            padding: 0 20px;
            /* overflow-x: hidden; */ /* Removed to ensure carousel visibility */
        }


        .dashboard-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .dashboard-header h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            color: #aaa;
            font-size: 1.1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Seções do Dashboard (Cards) */
        .dash-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .dash-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            opacity: 0.5;
        }

        .dash-card h2 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Lista de Pedidos */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .order-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .order-item:hover {
            border-color: rgba(255, 0, 64, 0.3);
            transform: translateX(5px);
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .order-id {
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            word-break: break-all;
            display: inline-block;
            max-width: 100%;
        }

        .order-date {
            color: #aaa;
            font-size: 0.9rem;
        }

        .order-status {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(255, 0, 64, 0.1);
            color: var(--accent-primary);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(255, 0, 64, 0.2);
        }

        /* Ferramentas e Botões Rápidos */
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .tool-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tool-btn.btn-primary {
            background: var(--accent-primary);
            border: none;
            justify-content: center;
            font-weight: 700;
        }

        .tool-btn.btn-primary:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 64, 0.3);
        }

        /* Upsell Banner */
        .upsell-banner {
            background: linear-gradient(135deg, rgba(255,0,64,0.1) 0%, rgba(20,20,20,0.8) 100%);
            border: 1px solid rgba(255, 0, 64, 0.3);
            border-radius: 16px;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 30px;
        }

        .upsell-banner::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,0,64,0.1) 0%, transparent 60%);
            z-index: 0;
        }

        .upsell-content {
            position: relative;
            z-index: 1;
        }

        .upsell-content h3 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .upsell-content p {
            color: #ccc;
            margin-bottom: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        /* Logout */
        .logout-container {
            text-align: right;
            margin-top: -20px;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: transparent;
            color: #888;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            color: #fff;
            border-color: #666;
            background: rgba(255,255,255,0.05);
        }
    </style>

</head>

<body class="account-page">

    <!-- ==================== HEADER (Idêntico à Index) ==================== -->
    <header class="header" id="header">
        <div class="header-inner">
            <div class="search-wrapper" style="opacity: 0; pointer-events: none;">
                <!-- Oculto no dash, mas mantendo a estrutura para alinhamento -->
                <input type="text" class="search-bar" disabled>
            </div>

            <a href="index.html" class="logo">
                <img src="assets/logo-ignite.png" alt="Olimpo Pods Logo" class="rotating-logo">
            </a>

            <button class="mobile-toggle" id="mobileToggle" aria-label="Menu" style="opacity: 0; pointer-events: none;">
                <span></span><span></span><span></span>
            </button>

            <div class="header-actions">
                <a href="index.html" class="action-btn" aria-label="Voltar à Loja" title="Loja">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <!-- ==================== DASHBOARD CONTENT ==================== -->
    <div class="dashboard-container">
        
        <div class="logout-container">
            <button class="logout-btn" id="logoutBtn">Sair da Conta</button>
        </div>

        <div class="dashboard-header">
            <h1 id="userGreeting">Olá, Reverenciado</h1>
            <p id="userEmailDisplay">Carregando seus dados...</p>
        </div>

        <div class="dashboard-grid">
            
            <!-- Coluna Esquerda: Pedidos -->
            <div class="dash-column">
                <div class="dash-card">
                    <h2>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                            <polyline points="10 9 9 9 8 9" />
                        </svg>
                        Histórico de Pedidos
                    </h2>
                    
                    <div class="orders-list" id="accountOrdersList">
                        <!-- Pedidos serão injetados via JS -->
                        <div style="text-align: center; color: #888; padding: 20px;">Carregando pedidos...</div>
                    </div>
                </div>

            </div>

            <!-- Coluna Direita: Ferramentas e Upsell -->
            <div class="dash-column">
                
                <div class="dash-card">
                    <h2>Atalhos</h2>
                    <div class="tools-grid">
                        <a href="tracking.html" class="tool-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                <circle cx="12" cy="10" r="3" />
                            </svg>
                            Rastrear meu pedido
                        </a>

                        <a href="https://wa.me/5511915704509" target="_blank" class="tool-btn">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">

                            </svg>
                            Suporte Whatsapp
                        </a>
                    </div>
                </div>

            </div> <!-- End dash-column right -->
        </div> <!-- End dashboard-grid -->

        <div class="upsell-section-new">
            <div class="upsell-header-new">
                <div class="upsell-copy">
                    <p class="main-msg">Faltam 30 itens para 5% de desconto</p>
                </div>
                <div class="upsell-progress-wrapper" id="accountUpsellProgress">
                    <div class="progress-bar-container">
                        <div class="upsell-progress-fill" id="accountProgressFill"></div>
                    </div>
                    <div class="progress-subtext">50+ unidades frete é grátis.</div>
                </div>
            </div>
            
            <div class="upsell-products-wrapper">
                <button class="carousel-nav-btn prev" id="prevBtnAccount" aria-label="Anterior">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <div class="upsell-carousel" id="upsellProductsBar">
                    <!-- Products injected here -->
                    <div class="loading-products">Carregando ofertas...</div>
                </div>
                <button class="carousel-nav-btn next" id="nextBtnAccount" aria-label="Próximo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </div>
    </div> <!-- End dashboard-container -->



    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/supabase-config.js"></script>
    <script src="account.js"></script>

</body>
</html>
